name: Lab API Service CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decision.outputs.should_deploy }}
    steps:
      - id: decision
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    uses: Projet-technique-Altair/altair-ci/.github/workflows/microservices-cd.yml@main
    with:
      gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
      region: ${{ vars.GCP_REGION }}
      artifact_registry_host: ${{ vars.GCP_ARTIFACT_REGISTRY_HOST }}
      artifact_registry_repo: ${{ vars.GCP_ARTIFACT_REPO }}
      workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
      deploy_service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      service_name: altair-lab-api-service
      image_name: altair-lab-api-service

      workdir: .
      dockerfile: Dockerfile
      platform: linux/amd64

      # This service keeps the control-plane configuration:
      # GKE endpoint, cluster CA, sessions-ms lookup, webshell URL, LAB-WEB cookie signing.
      # The runtime HTTP proxy target is no longer hosted here, so remove
      # LAB_API_ROLE and LAB_WEB_PROXY_BASE_URL from CLOUD_RUN_ENV_VARS.
      cloud_run_service_account: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}
      cloud_run_env_vars: ${{ vars.CLOUD_RUN_ENV_VARS }}
      cloud_run_secrets: ${{ vars.CLOUD_RUN_SECRETS }}
      extra_deploy_args: ${{ vars.CLOUD_RUN_EXTRA_ARGS }}
