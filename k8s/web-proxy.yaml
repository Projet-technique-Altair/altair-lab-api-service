apiVersion: v1
kind: ServiceAccount
metadata:
  name: altair-web-proxy
  namespace: labs-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: altair-web-proxy
  namespace: labs-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: altair-web-proxy
  template:
    metadata:
      labels:
        app: altair-web-proxy
    spec:
      serviceAccountName: altair-web-proxy
      containers:
        - name: altair-web-proxy
          image: europe-west9-docker.pkg.dev/altair-isen/altair-repo/altair-lab-api-service:v3
          imagePullPolicy: IfNotPresent
          env:
            - name: LAB_API_LOCAL_MODE
              value: "true"
            - name: LAB_API_ROLE
              value: "web-proxy"
            - name: PORT
              value: "8085"
            - name: RUST_LOG
              value: "info"
            - name: WEB_PROXY_NAMESPACE
              value: "labs-web"
            - name: WEB_PROXY_SERVICE_SUFFIX
              value: "-web"
            - name: WEB_PROXY_REQUEST_TIMEOUT_SECONDS
              value: "30"
          ports:
            - containerPort: 8085
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: altair-web-proxy-internal
  namespace: labs-web
  annotations:
    networking.gke.io/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
  selector:
    app: altair-web-proxy
  ports:
    - name: http
      port: 80
      targetPort: 8085
